spring:
  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/mao?useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf-8
    username: example
    password: 123456
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
# LDAP
ldap:
  url: ${LDAP_URL:ldap://127.0.0.1:389}
  base-dn: ${LDAP_BASE_DN:dc=example,dc=com}
  user-dn: ${LDAP_USER_DN:admin@example.com}
  password: ${LDAP_PASSWORD:123456}
  user-search-base: ${LDAP_USER_SEARCH_BASE:ou=Example}

# Feishu
feishu:
  app-id: ${FEISHU_APP_ID:1234567890}
  app-secret: ${FEISHU_APP_SECRET:1234567890}
  redirect-uri: ${FEISHU_REDIRECT_URI:http://example.com/auth/feishu/callback}

# JWT
jwt:
  secret: ${JWT_SECRET:workbench-default-secret-change-in-production}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days

# App config
app:
  root-dir: ${MAO_ROOT_DIR:/opt/mao}
  git-credential:
    secret-key: ${APP_GIT_CREDENTIAL_SECRET:local-dev-git-credential-secret-change-me}
  # Upload storage
  upload:
    storage-mode: ${UPLOAD_STORAGE_MODE:local}  # oss or local
    base-url: ${UPLOAD_BASE_URL:http://localhost:9080/api}  # local 模式公网访问前缀，生产环境改为实际域名
  # File storage
  file:
    upload-dir: ${FILE_UPLOAD_DIR:${MAO_ROOT_DIR}/data/uploads}
    max-size-mb: 50
  # WebSocket streaming
  ws:
    outbound-queue-capacity: 10000
  # Agent Harness
  harness:
    workspace-root: ${WORKSPACE_ROOT:${MAO_ROOT_DIR}/data/workspace}
    runtime-dir: ${RUNTIME_DIR:${MAO_ROOT_DIR}/data/runtime}
    max-concurrent-agents: 100
    agent-thread-pool-size: 20
    agent-thread-pool-max: 100
    agent-thread-pool-queue: 200
    default-max-rounds: 10
    default-context-rounds: 20

    # LLM API
    llm:
      rate-limit-max-retries: 10
      rate-limit-retry-delay-seconds: 5

    # Context Compaction
    compaction:
      enabled: true
      context-window-tokens: 256000
      trigger-ratio: 0.72
      recent-turns: 6
      min-compact-message-count: 10
      min-new-message-count: 8
      max-compaction-batch-messages: 200
      max-rounds-per-request: 30
      loop-enabled: true
      loop-trigger-tokens: 96000
      loop-recent-tool-rounds: 5

    # Skills directory (external filesystem path, each subfolder is a skill)
    skills-dir: ${SKILLS_DIR:${MAO_ROOT_DIR}/data/skills}
    user-skills-dir: ${USER_SKILLS_DIR:${MAO_ROOT_DIR}/data/userskills}
    skills-cache-seconds: 300

    # Shell Session
    shell:
      enabled: true
      max-sessions-per-conversation: 30
      session-idle-timeout-minutes: 30
      session-max-lifetime-hours: 2
      output:
        max-preview-lines: 100
        max-preview-chars: 10000
        default-yield-time-ms: 10000

    # Tavily Search
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: ${TAVILY_BASE_URL:https://api.tavily.com}
      connect-timeout: 10000
      read-timeout: 30000
      max-results: 5

    # Web Page Fetching
    web-page:
      connect-timeout: 10000
      read-timeout: 30000
      max-raw-bytes: 1048576
      max-output-length: 500000
      user-agent: "Mozilla/5.0 (compatible; AgentWorkbench/1.0)"

# Aliyun OSS
oss:
  region: ${OSS_REGION:oss-cn-hangzhou}
  access-key-id: ${OSS_ACCESS_KEY_ID:1234567890}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:1234567890}
  bucket: ${OSS_BUCKET:example}
  max-keys: 100
  sts:
    region-id: ${OSS_STS_REGION_ID:cn-hangzhou}
    endpoint: ${OSS_STS_ENDPOINT:sts.cn-hangzhou.aliyuncs.com}
    access-key-id: ${OSS_STS_ACCESS_KEY_ID:1234567890}
    access-key-secret: ${OSS_STS_ACCESS_KEY_SECRET:1234567890}
    role-arn: ${OSS_STS_ROLE_ARN:acs:ram::1234567890:role/example}
    role-session-name: ${OSS_STS_ROLE_SESSION_NAME:ExampleSession}
    expire: 3600
    max-size-mb: 20
