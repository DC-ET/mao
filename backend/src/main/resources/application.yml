server:
  port: 9080
  servlet:
    context-path: /api
  tomcat:
    # Skill 上传单次可包含多个文件，需高于 Tomcat 10.1 默认的 10
    max-part-count: 500

logging:
  level:
    com.agentworkbench: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.apache.ibatis: INFO
    org.mybatis.spring: INFO
    com.zaxxer.hikari: INFO
    org.springframework.jdbc: INFO
    org.springframework.transaction: INFO

spring:
  application:
    name: workbench-backend
  profiles:
    active: local # copy from application-example.yml to application-local.yml

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 12
    validate-on-migrate: false
    locations: classpath:db/migration

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # File upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.agentworkbench.**.entity

# JWT
jwt:
  secret: ${JWT_SECRET:workbench-default-secret-change-in-production}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days

# App config
app:
  # Upload storage
  upload:
    storage-mode: ${UPLOAD_STORAGE_MODE:oss}  # oss or local
    base-url: ${UPLOAD_BASE_URL:http://localhost:9080/api}  # public base for local-mode file access; production: https://mao.etarch.cn
  # File storage
  file:
    upload-dir: ${FILE_UPLOAD_DIR:/data/workbench/uploads}
    max-size-mb: 50

  # WebSocket streaming
  ws:
    outbound-queue-capacity: 10000

  # Agent Harness
  harness:
    workspace-root: ${WORKSPACE_ROOT:/data/workbench/workspace}
    max-concurrent-agents: 100
    agent-thread-pool-size: 20
    agent-thread-pool-max: 100
    agent-thread-pool-queue: 200
    default-max-rounds: 10
    default-context-rounds: 20

    # LLM API
    llm:
      rate-limit-max-retries: 10
      rate-limit-retry-delay-seconds: 5

    # Context Compaction
    compaction:
      enabled: true
      context-window-tokens: 256000
      trigger-ratio: 0.72
      recent-turns: 6
      min-compact-message-count: 10
      min-new-message-count: 8
      max-compaction-batch-messages: 200
      max-rounds-per-request: 30
      loop-enabled: true
      loop-trigger-tokens: 96000
      loop-recent-tool-rounds: 5

    # Skills directory (external filesystem path, each subfolder is a skill)
    skills-dir: ${SKILLS_DIR:/data/workbench/skills}
    user-skills-dir: ${USER_SKILLS_DIR:/data/workbench/userskills}
    skills-cache-seconds: 300

    # Shell Session
    shell:
      enabled: true
      max-sessions-per-conversation: 30
      session-idle-timeout-minutes: 30
      session-max-lifetime-hours: 2
      output:
        max-preview-lines: 100
        max-preview-chars: 10000
        default-yield-time-ms: 10000

    # Tavily Search
    tavily:
      api-key: ${TAVILY_API_KEY:}
      base-url: ${TAVILY_BASE_URL:https://api.tavily.com}
      connect-timeout: 10000
      read-timeout: 30000
      max-results: 5

    # Web Page Fetching
    web-page:
      connect-timeout: 10000
      read-timeout: 30000
      max-raw-bytes: 1048576
      max-output-length: 500000
      user-agent: "Mozilla/5.0 (compatible; AgentWorkbench/1.0)"

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
