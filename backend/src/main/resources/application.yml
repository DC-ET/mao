server:
  port: 9080
  servlet:
    context-path: /api

spring:
  application:
    name: workbench-backend
  profiles:
    active: dev

  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://120.26.109.221:3306/agentworkbench2?useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true&zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf-8
    username: root
    password: REDACTED_MYSQL_PASSWORD
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000

  # Redis
  data:
    redis:
      host: 120.26.109.221
      port: 6379
      password: REDACTED_MYSQL_PASSWORD
      database: 1
      timeout: 5000ms

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 12
    validate-on-migrate: false
    locations: classpath:db/migration

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # File upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.agentworkbench.**.entity

# JWT
jwt:
  secret: ${JWT_SECRET:workbench-default-secret-change-in-production}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:workbench}

# LDAP
ldap:
  url: ${LDAP_URL:ldap://172.20.230.237:389}
  base-dn: ${LDAP_BASE_DN:dc=accesscorporate,dc=com,dc=cn}
  user-dn: ${LDAP_USER_DN:apollo@accesscorporate.com.cn}
  password: ${LDAP_PASSWORD:REDACTED_LDAP_PASSWORD}
  user-search-base: ${LDAP_USER_SEARCH_BASE:ou=ACCESS}

# Feishu
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  redirect-uri: ${FEISHU_REDIRECT_URI:http://localhost:5200/auth/feishu/callback}

# App config
app:
  # File storage
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size-mb: 50

  # Agent Harness
  harness:
    workspace-root: ${WORKSPACE_ROOT:/data/workbench/workspace}
    max-concurrent-agents: 100
    agent-thread-pool-size: 20
    agent-thread-pool-max: 100
    agent-thread-pool-queue: 200
    default-max-rounds: 10
    default-context-rounds: 20

    # Context Compaction
    compaction:
      enabled: true
      context-window-tokens: 256000
      trigger-ratio: 0.72
      recent-turns: 6
      min-compact-message-count: 10
      min-new-message-count: 8
      max-compaction-batch-messages: 200
      max-rounds-per-request: 30
      loop-enabled: true
      loop-trigger-tokens: 96000
      loop-recent-tool-rounds: 5

    # Skills directory (external filesystem path, each subfolder is a skill)
    skills-dir: ${SKILLS_DIR:/data/workbench/skills}
    skills-cache-seconds: 300

    # Shell Session
    shell:
      enabled: true
      max-sessions-per-conversation: 5
      session-idle-timeout-minutes: 30
      session-max-lifetime-hours: 2
      output:
        max-preview-lines: 100
        max-preview-chars: 10000
        default-yield-time-ms: 10000

# Aliyun OSS
oss:
  region: ${OSS_REGION:oss-cn-hangzhou}
  access-key-id: ${OSS_ACCESS_KEY_ID:REDACTED_OSS_KEY}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:REDACTED_OSS_SECRET}
  bucket: ${OSS_BUCKET:etarch}
  max-keys: 100
  sts:
    region-id: ${OSS_STS_REGION_ID:cn-hangzhou}
    endpoint: ${OSS_STS_ENDPOINT:sts.cn-hangzhou.aliyuncs.com}
    access-key-id: ${OSS_STS_ACCESS_KEY_ID:REDACTED_STS_KEY}
    access-key-secret: ${OSS_STS_ACCESS_KEY_SECRET:REDACTED_STS_SECRET}
    role-arn: ${OSS_STS_ROLE_ARN:acs:ram::REDACTED_RAM_ACCOUNT:role/ramosstest}
    role-session-name: ${OSS_STS_ROLE_SESSION_NAME:OssSession}
    expire: 3600
    max-size-mb: 20

# SpringDoc
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
